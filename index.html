<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Escape & Code Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landing-page">
        <div class="landing-content">
            <h1>TEMPLE OF THE CORE</h1>
            <button id="enter-btn" class="cool-btn" onclick="startGame()">ENTER THE SANCTUM</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="game-wrapper">
            <div id="visual-area">
                <h2 id="room-title">The Temple</h2>
                <div id="hotspot-container"></div>
                <button id="return-btn" class="cool-btn" onclick="returnToTemple()">RETURN</button>
            </div>

            <div id="right-sidebar">
                <div class="sidebar-header">INVENTORY</div>
                <div id="inventory-list"></div>
                <div class="help-circle">?</div>
            </div>
        </div>

        <div class="ui-footer">
            <div id="game-log">> System initialized...</div>
        </div>
    </div>

    <div id="code-space" style="display: none;">
        <div class="terminal-header">
            <span class="pulse">●</span> ENCRYPTED TERMINAL - CORE ACCESS
        </div>
        <div class="code-container">
            <div class="problem-statement">
                <h3>FINAL CHALLENGE: DATA RECOVERY</h3>
                <p>Write a function in C, C++, or Java to solve the <strong>Fibonacci Sequence</strong> for N.</p>
                <p>Example: Input 6 -> Output 8</p>
            </div>
            <textarea id="editor" spellcheck="false" placeholder="// Write your logic here..."></textarea>
            <div class="terminal-footer">
                <button id="submit-code" class="cool-btn" onclick="validateCode()">SUBMIT ENCRYPTION</button>
            </div>
        </div>
    </div>

    <div id="popup-overlay">
        <div class="popup-content">
            <h2 id="popup-title">Zoom</h2>
            <div class="square-frame">
                <img id="popup-image" src="">
            </div>
            <p id="popup-text"></p>
            <div id="popup-footer">
                <button id="mix-btn" class="cool-btn" style="display: none;" onclick="startSuccessSequence()">MIX FLUIDS</button>
                <button class="cool-btn" onclick="closePopup()">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
